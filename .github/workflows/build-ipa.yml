name: Build Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create project structure
        run: mkdir -p SanaaBlast/SanaaBlast

      - name: Write AppDelegate.swift
        run: |
          cat > SanaaBlast/SanaaBlast/AppDelegate.swift << 'EOF'
          import UIKit
          @UIApplicationMain
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ application: UIApplication,
                               didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  window?.rootViewController = ViewController()
                  window?.makeKeyAndVisible()
                  return true
              }
          }
          EOF

      - name: Write ViewController.swift
        run: |
          cat > SanaaBlast/SanaaBlast/ViewController.swift << 'EOF'
          import UIKit
          import WebKit
          class ViewController: UIViewController, WKNavigationDelegate {
              var webView: WKWebView!
              override func loadView() {
                  let cfg = WKWebViewConfiguration()
                  cfg.allowsInlineMediaPlayback = true
                  cfg.mediaTypesRequiringUserActionForPlayback = []
                  webView = WKWebView(frame: .zero, configuration: cfg)
                  webView.navigationDelegate = self
                  webView.scrollView.bounces = false
                  view = webView
              }
              override func viewDidLoad() {
                  super.viewDidLoad()
                  webView.load(URLRequest(url: URL(string: "https://sanablast.vercel.app")!))
              }
              func webView(_ webView: WKWebView, didFailProvisionalNavigation _: WKNavigation!, withError _: Error) {
                  webView.loadHTMLString("<html><body style='background:#0f1419;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:-apple-system;flex-direction:column;gap:12px'><h2>No Connection</h2><button onclick='location.reload()' style='background:#1d9bf0;color:#fff;border:none;padding:12px 28px;border-radius:24px;font-size:16px'>Retry</button></body></html>", baseURL: nil)
              }
          }
          EOF

      - name: Write Info.plist
        run: |
          cat > SanaaBlast/SanaaBlast/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDisplayName</key><string>Sanaa Blast</string>
              <key>CFBundleExecutable</key><string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key><string>com.sanaa.blast</string>
              <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
              <key>CFBundleName</key><string>SanaaBlast</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>1.0</string>
              <key>CFBundleVersion</key><string>1</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>NSAppTransportSecurity</key>
              <dict><key>NSAllowsArbitraryLoads</key><true/></dict>
              <key>UILaunchScreen</key><dict/>
              <key>UIRequiredDeviceCapabilities</key>
              <array><string>arm64</string></array>
              <key>UISupportedInterfaceOrientations</key>
              <array><string>UIInterfaceOrientationPortrait</string></array>
          </dict>
          </plist>
          EOF

      - name: Write Xcode project file
        run: |
          mkdir -p SanaaBlast/SanaaBlast.xcodeproj
          cat > SanaaBlast/SanaaBlast.xcodeproj/project.pbxproj << 'EOF'
          // !$*UTF8*$!
          {
          	archiveVersion = 1;
          	classes = {};
          	objectVersion = 56;
          	objects = {
          		B001 /* AppDelegate.swift */ = {isa = PBXBuildFile; fileRef = A001; };
          		B002 /* ViewController.swift */ = {isa = PBXBuildFile; fileRef = A002; };
          		A001 /* AppDelegate.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = AppDelegate.swift; sourceTree = "<group>"; };
          		A002 /* ViewController.swift */ = {isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = ViewController.swift; sourceTree = "<group>"; };
          		A004 /* Info.plist */ = {isa = PBXFileReference; lastKnownFileType = text.plist.xml; path = Info.plist; sourceTree = "<group>"; };
          		PROD /* SanaaBlast.app */ = {isa = PBXFileReference; explicitFileType = wrapper.application; includeInIndex = 0; path = SanaaBlast.app; sourceTree = BUILT_PRODUCTS_DIR; };
          		MAINGRP = {isa = PBXGroup; children = (SRCGRP, PRODGRP); sourceTree = "<group>"; };
          		SRCGRP = {isa = PBXGroup; children = (A001, A002, A004); path = SanaaBlast; sourceTree = "<group>"; };
          		PRODGRP = {isa = PBXGroup; children = (PROD); name = Products; sourceTree = "<group>"; };
          		TARGET = {
          			isa = PBXNativeTarget;
          			buildConfigurationList = BUILDCFG;
          			buildPhases = (SRCPHASE);
          			buildRules = ();
          			dependencies = ();
          			name = SanaaBlast;
          			productName = SanaaBlast;
          			productReference = PROD;
          			productType = "com.apple.product-type.application";
          		};
          		PROJECT = {
          			isa = PBXProject;
          			attributes = {LastSwiftUpdateCheck = 1500; LastUpgradeCheck = 1500;};
          			buildConfigurationList = PROJCFG;
          			compatibilityVersion = "Xcode 14.0";
          			developmentRegion = en;
          			hasScannedForEncodings = 0;
          			knownRegions = (en);
          			mainGroup = MAINGRP;
          			productRefGroup = PRODGRP;
          			projectDirPath = "";
          			projectRoot = "";
          			targets = (TARGET);
          		};
          		SRCPHASE = {
          			isa = PBXSourcesBuildPhase;
          			buildActionMask = 2147483647;
          			files = (B001, B002);
          			runOnlyForDeploymentPostprocessing = 0;
          		};
          		CFG_RELEASE = {
          			isa = XCBuildConfiguration;
          			buildSettings = {
          				ALWAYS_SEARCH_USER_PATHS = NO;
          				CODE_SIGN_IDENTITY = "";
          				CODE_SIGNING_ALLOWED = NO;
          				CODE_SIGNING_REQUIRED = NO;
          				GCC_C_LANGUAGE_STANDARD = gnu17;
          				IPHONEOS_DEPLOYMENT_TARGET = 14.0;
          				SDKROOT = iphoneos;
          				SWIFT_COMPILATION_MODE = wholemodule;
          				SWIFT_VERSION = 5.0;
          			};
          			name = Release;
          		};
          		TCFG_RELEASE = {
          			isa = XCBuildConfiguration;
          			buildSettings = {
          				CODE_SIGN_IDENTITY = "";
          				CODE_SIGNING_ALLOWED = NO;
          				CODE_SIGNING_REQUIRED = NO;
          				DEVELOPMENT_TEAM = "";
          				INFOPLIST_FILE = SanaaBlast/Info.plist;
          				IPHONEOS_DEPLOYMENT_TARGET = 14.0;
          				LD_RUNPATH_SEARCH_PATHS = "@executable_path/Frameworks";
          				MARKETING_VERSION = 1.0;
          				PRODUCT_BUNDLE_IDENTIFIER = com.sanaa.blast;
          				PRODUCT_NAME = "$(TARGET_NAME)";
          				SDKROOT = iphoneos;
          				SWIFT_VERSION = 5.0;
          				TARGETED_DEVICE_FAMILY = "1,2";
          			};
          			name = Release;
          		};
          		PROJCFG = {isa = XCConfigurationList; buildConfigurations = (CFG_RELEASE); defaultConfigurationIsVisible = 0; defaultConfigurationName = Release;};
          		BUILDCFG = {isa = XCConfigurationList; buildConfigurations = (TCFG_RELEASE); defaultConfigurationIsVisible = 0; defaultConfigurationName = Release;};
          	};
          	rootObject = PROJECT;
          }
          EOF

      - name: Show project structure
        run: find SanaaBlast -type f

      - name: Build unsigned app
        run: |
          xcodebuild \
            -project SanaaBlast/SanaaBlast.xcodeproj \
            -target SanaaBlast \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            CONFIGURATION_BUILD_DIR="$(pwd)/build" \
            clean build

      - name: Package IPA
        run: |
          ls build/
          mkdir -p Payload
          cp -r build/SanaaBlast.app Payload/
          zip -r SanaaBlast-unsigned.ipa Payload/
          echo "Done: $(du -h SanaaBlast-unsigned.ipa | cut -f1)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SanaaBlast-unsigned-ipa
          path: SanaaBlast-unsigned.ipa
          retention-days: 30
