name: Build Standalone IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps + Capacitor
        run: |
          npm ci
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Build static export
        run: npx next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://xhegpgkyivzzdrqjwzoz.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhoZWdwZ2t5aXZ6emRycWp3em96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NzMyOTksImV4cCI6MjA5NDQ0OTI5OX0.WGYsGA4_vXrRP_Cl5oLrd2dZ5hcppOQVUszh0KvwW10

      - name: Capacitor - add iOS platform
        run: npx cap add ios

      - name: Fix Podfile iOS minimum deployment target
        run: |
          PODFILE="ios/App/Podfile"
          echo "Before fix:"
          grep -i "platform" "$PODFILE" || true
          # Capacitor 7.x requires iOS 16.0+
          sed -i '' "s/platform :ios, '[0-9.]*/platform :ios, '16.0/g" "$PODFILE"
          # If no platform line exists, add it
          if ! grep -q "platform :ios" "$PODFILE"; then
            sed -i '' '1s/^/platform :ios, '"'"'16.0'"'"'\n/' "$PODFILE"
          fi
          echo "After fix:"
          grep -i "platform" "$PODFILE" || true

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Build unsigned IPA
        run: |
          XCPROJ=$(find ios -name "*.xcodeproj" | head -1)
          SCHEME=$(basename "$XCPROJ" .xcodeproj)
          echo "Project: $XCPROJ | Scheme: $SCHEME"

          xcodebuild \
            -project "$XCPROJ" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            CONFIGURATION_BUILD_DIR="$(pwd)/build" \
            clean build

      - name: Package IPA
        run: |
          APP=$(find build -name "*.app" | head -1)
          echo "Packaging: $APP"
          mkdir Payload
          cp -r "$APP" Payload/
          zip -qr SanaaBlast-unsigned.ipa Payload/
          echo "Size: $(du -h SanaaBlast-unsigned.ipa | cut -f1)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SanaaBlast-unsigned-ipa
          path: SanaaBlast-unsigned.ipa
          retention-days: 30
