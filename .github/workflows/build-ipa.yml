name: Build Standalone IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps + Capacitor
        run: |
          npm ci
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Build static export
        run: npx next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://xhegpgkyivzzdrqjwzoz.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhoZWdwZ2t5aXZ6emRycWp3em96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NzMyOTksImV4cCI6MjA5NDQ0OTI5OX0.WGYsGA4_vXrRP_Cl5oLrd2dZ5hcppOQVUszh0KvwW10

      - name: Capacitor - add iOS (allow pod install to fail)
        run: npx cap add ios || true

      - name: Generate Native Assets (Icons & Splash Screen)
        run: npx @capacitor/assets generate --ios

      - name: Fix Podfile iOS minimum deployment target
        run: |
          PODFILE="ios/App/Podfile"
          echo "=== Podfile before ==="
          cat "$PODFILE" | head -10
          # Capacitor 7.x requires iOS 16.0+
          sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '16.0'/g" "$PODFILE"
          # If still not set, force prepend
          if ! grep -q "platform :ios, '16.0'" "$PODFILE"; then
            echo "platform :ios, '16.0'" | cat - "$PODFILE" > /tmp/Podfile.tmp && mv /tmp/Podfile.tmp "$PODFILE"
          fi
          echo "=== Podfile after ==="
          cat "$PODFILE" | head -10

      - name: Run pod install with correct target
        run: |
          cd ios/App
          pod install --repo-update

      - name: Copy web assets to iOS
        run: npx cap copy ios


      - name: Build unsigned IPA
        run: |
          # CocoaPods requires building via .xcworkspace, not .xcodeproj
          XCWORKSPACE=$(find ios -name "*.xcworkspace" | grep -v "xcodeproj" | head -1)
          SCHEME="App"
          echo "Workspace: $XCWORKSPACE | Scheme: $SCHEME"
          ls ios/App/

          xcodebuild \
            -workspace "$XCWORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            IPHONEOS_DEPLOYMENT_TARGET=16.0 \
            CONFIGURATION_BUILD_DIR="$(pwd)/build" \
            clean build 2>&1 | grep -E "error:|warning:|BUILD|note:" | tail -50

      - name: Package IPA
        run: |
          APP=$(find build -name "*.app" | head -1)
          echo "Packaging: $APP"
          mkdir Payload
          cp -r "$APP" Payload/
          zip -qr SanaaBlast-unsigned.ipa Payload/
          echo "Size: $(du -h SanaaBlast-unsigned.ipa | cut -f1)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SanaaBlast-unsigned-ipa
          path: SanaaBlast-unsigned.ipa
          retention-days: 30
